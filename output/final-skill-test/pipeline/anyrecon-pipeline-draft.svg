<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="680" viewBox="0 0 1600 680" role="img" aria-labelledby="title desc">
  <title id="title">AnyRecon editable pipeline draft</title>
  <desc id="desc">An independently designed left-to-right storyboard based on the paper text, showing captured views, geometry memory, retrieval, geometry-conditioned video diffusion, generated views, and iterative geometry update.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.13"/>
    </filter>
    <pattern id="image-placeholder" width="18" height="18" patternUnits="userSpaceOnUse">
      <rect width="18" height="18" fill="#FFFFFF"/>
      <path d="M0 0L18 18M18 0L0 18" stroke="#D9D9D9" stroke-width="0.8"/>
    </pattern>
    <pattern id="mask-placeholder" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect width="24" height="24" fill="#F9CB8A"/>
      <rect width="12" height="12" fill="#AEC6FE"/>
      <rect x="12" y="12" width="12" height="12" fill="#B3CDA2"/>
    </pattern>
    <linearGradient id="diffusion-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#86AAFE"/>
      <stop offset="1" stop-color="#5D8DFD"/>
    </linearGradient>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#595959"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5D8DFD"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#88B06D"/>
    </marker>
    <style>
      text{font-family:Optima,Candara,"Segoe UI",Arial,sans-serif}
      .scope{fill:#FFFFFF;stroke-width:1.4;stroke-dasharray:7 6}
      .scope-title{font-size:17px;font-weight:700;letter-spacing:.3px}
      .module-title{font-size:17px;font-weight:700}
      .label{font-size:14px;font-weight:600}
      .meta{font-size:12px;fill:#666666}
      .tiny{font-size:11px;fill:#666666}
      .card{fill:#FFFFFF;stroke:#A5A5A5;stroke-width:1.2}
      .primary{fill:none;stroke:#595959;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow-gray)}
      .condition{fill:none;stroke:#5D8DFD;stroke-width:1.7;stroke-dasharray:5 5;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow-blue)}
      .feedback{fill:none;stroke:#88B06D;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow-green)}
    </style>
  </defs>

  <g id="figure-background"><rect width="1600" height="680" fill="#FFFFFF"/></g>

  <g id="draft-header">
    <rect x="28" y="18" width="178" height="30" rx="15" fill="#D0B3FF" fill-opacity="0.32"/>
    <text x="117" y="39" text-anchor="middle" font-size="13" font-weight="700" fill="#7A5DE1">DRAFT - EDITABLE SVG</text>
    <text x="235" y="39" font-size="18" font-weight="700">AnyRecon method storyboard</text>
    <text x="1572" y="39" text-anchor="end" class="meta">Designed from paper text - not copied from the original figure</text>
  </g>

  <g id="scopes">
    <g id="scope-capture">
      <rect class="scope" x="28" y="68" width="246" height="540" rx="19" stroke="#5D8DFD"/>
      <text x="48" y="98" class="scope-title" fill="#5D8DFD">1 - ARBITRARY CAPTURES</text>
    </g>
    <g id="scope-geometry">
      <rect class="scope" x="292" y="68" width="348" height="540" rx="19" stroke="#88B06D"/>
      <text x="312" y="98" class="scope-title" fill="#88B06D">2 - SHARED 3D MEMORY</text>
    </g>
    <g id="scope-generation">
      <rect class="scope" x="658" y="68" width="596" height="540" rx="19" stroke="#7A5DE1"/>
      <text x="678" y="98" class="scope-title" fill="#7A5DE1">3 - SEGMENT GENERATION</text>
    </g>
    <g id="scope-update-output">
      <rect class="scope" x="1272" y="68" width="300" height="540" rx="19" stroke="#F5433D"/>
      <text x="1292" y="98" class="scope-title" fill="#F5433D">4 - OUTPUT + UPDATE</text>
    </g>
  </g>

  <g id="capture-inputs">
    <g id="placeholder-captured-view-bank" filter="url(#shadow)">
      <rect class="card" x="52" y="124" width="198" height="210" rx="13"/>
      <g id="captured-view-thumbnails">
        <rect x="68" y="146" width="80" height="66" rx="8" fill="url(#image-placeholder)" stroke="#5D8DFD" stroke-width="1.2"/>
        <rect x="102" y="176" width="80" height="66" rx="8" fill="url(#image-placeholder)" stroke="#86AAFE" stroke-width="1.2"/>
        <rect x="136" y="206" width="80" height="66" rx="8" fill="url(#image-placeholder)" stroke="#AEC6FE" stroke-width="1.2"/>
      </g>
      <text x="151" y="298" text-anchor="middle" class="label">Captured view bank Icap</text>
      <text x="151" y="318" text-anchor="middle" class="meta">REPLACE: sparse unordered RGB views</text>
    </g>
    <g id="module-initial-reconstruction" filter="url(#shadow)">
      <rect x="65" y="390" width="172" height="94" rx="13" fill="#AEC6FE" stroke="#5D8DFD" stroke-width="1.2"/>
      <text x="151" y="429" text-anchor="middle" class="module-title">Point-map estimator</text>
      <text x="151" y="452" text-anchor="middle" class="meta">VGGT / pi3</text>
      <text x="151" y="471" text-anchor="middle" class="tiny">initial geometry construction</text>
    </g>
  </g>

  <g id="geometry-memory">
    <g id="result-geometry-memory" filter="url(#shadow)">
      <rect x="318" y="124" width="296" height="225" rx="14" fill="#B3CDA2" fill-opacity="0.14" stroke="#88B06D" stroke-width="1.5"/>
      <g id="point-cloud-placeholder" fill="#88B06D" opacity="0.82">
        <circle cx="362" cy="192" r="5"/><circle cx="392" cy="168" r="4"/><circle cx="425" cy="208" r="6"/><circle cx="458" cy="176" r="4"/><circle cx="492" cy="219" r="5"/><circle cx="530" cy="181" r="6"/><circle cx="565" cy="210" r="4"/>
        <circle cx="374" cy="243" r="4"/><circle cx="409" cy="267" r="6"/><circle cx="447" cy="238" r="5"/><circle cx="482" cy="282" r="4"/><circle cx="521" cy="250" r="5"/><circle cx="559" cy="276" r="6"/>
        <path d="M362 192L425 208L458 176L530 181L565 210M374 243L409 267L447 238L482 282L521 250L559 276M425 208L447 238M492 219L521 250" fill="none" stroke="#9EBF88" stroke-width="2"/>
      </g>
      <text x="466" y="310" text-anchor="middle" class="module-title" fill="#88B06D">3D Geometry Memory Mgeo</text>
      <text x="466" y="331" text-anchor="middle" class="meta">REPLACE: current point cloud / geometry</text>
    </g>
    <g id="module-geometry-retrieval" filter="url(#shadow)">
      <rect x="318" y="394" width="136" height="102" rx="12" fill="#F9CB8A" stroke="#F5A83D" stroke-width="1.2"/>
      <text x="386" y="430" text-anchor="middle" class="label">Geometry-aware</text>
      <text x="386" y="449" text-anchor="middle" class="label">retrieval</text>
      <text x="386" y="473" text-anchor="middle" class="tiny">visibility + contribution</text>
    </g>
    <g id="module-geometry-render" filter="url(#shadow)">
      <rect x="478" y="394" width="136" height="102" rx="12" fill="#B3CDA2" stroke="#88B06D" stroke-width="1.2"/>
      <text x="546" y="430" text-anchor="middle" class="label">Render Mgeo</text>
      <text x="546" y="451" text-anchor="middle" class="meta">target viewpoints</text>
      <text x="546" y="473" text-anchor="middle" class="tiny">RGB prior + visibility</text>
    </g>
  </g>

  <g id="segment-generation">
    <g id="target-trajectory">
      <rect x="684" y="119" width="544" height="72" rx="14" fill="#D0B3FF" fill-opacity="0.16" stroke="#A984E6" stroke-width="1.2"/>
      <text x="704" y="146" class="label" fill="#7A5DE1">User-specified novel trajectory Vnovel</text>
      <path d="M720 170C790 128 852 185 918 151S1058 174 1188 143" fill="none" stroke="#7A5DE1" stroke-width="2" stroke-dasharray="5 5"/>
      <circle cx="720" cy="170" r="5" fill="#7A5DE1"/><circle cx="850" cy="166" r="5" fill="#A984E6"/><circle cx="982" cy="158" r="5" fill="#A984E6"/><circle cx="1188" cy="143" r="5" fill="#7A5DE1"/>
      <text x="1198" y="175" text-anchor="end" class="tiny">split into short segments</text>
    </g>
    <g id="retrieved-and-rendered-context">
      <g id="selected-views" filter="url(#shadow)">
        <rect class="card" x="684" y="224" width="170" height="122" rx="12"/>
        <rect x="701" y="244" width="56" height="45" rx="6" fill="url(#image-placeholder)" stroke="#F5A83D"/>
        <rect x="725" y="263" width="56" height="45" rx="6" fill="url(#image-placeholder)" stroke="#F7BA64"/>
        <text x="769" y="326" text-anchor="middle" class="label">Selected views Isel</text>
      </g>
      <g id="rendered-prior-mask" filter="url(#shadow)">
        <rect class="card" x="684" y="374" width="170" height="142" rx="12"/>
        <rect x="700" y="394" width="64" height="68" rx="7" fill="url(#image-placeholder)" stroke="#88B06D"/>
        <rect x="774" y="394" width="64" height="68" rx="7" fill="url(#mask-placeholder)" stroke="#88B06D"/>
        <text x="769" y="487" text-anchor="middle" class="label">Irender + mask Mt</text>
        <text x="769" y="505" text-anchor="middle" class="tiny">REPLACE: aligned conditions</text>
      </g>
    </g>
    <g id="module-video-diffusion" filter="url(#shadow)">
      <rect x="884" y="224" width="344" height="292" rx="16" fill="url(#diffusion-fill)"/>
      <text x="1056" y="260" text-anchor="middle" font-size="19" font-weight="700" fill="#FFFFFF">Unordered Contextual</text>
      <text x="1056" y="284" text-anchor="middle" font-size="19" font-weight="700" fill="#FFFFFF">Video Diffusion</text>
      <g id="module-global-scene-memory">
        <rect x="910" y="311" width="292" height="54" rx="10" fill="#FFFFFF" fill-opacity="0.93"/>
        <text x="1056" y="335" text-anchor="middle" class="label" fill="#5D8DFD">Global Scene Memory</text>
        <text x="1056" y="353" text-anchor="middle" class="tiny">selected captures prepended as persistent KV context</text>
      </g>
      <g id="module-noncompressive-encoding">
        <rect x="910" y="379" width="139" height="72" rx="10" fill="#FFFFFF" fill-opacity="0.93"/>
        <text x="979.5" y="406" text-anchor="middle" class="label" fill="#5D8DFD">Frame-wise 2D VAE</text>
        <text x="979.5" y="428" text-anchor="middle" class="tiny">no temporal compression</text>
      </g>
      <g id="module-sparse-attention">
        <rect x="1063" y="379" width="139" height="72" rx="10" fill="#FFFFFF" fill-opacity="0.93"/>
        <text x="1132.5" y="406" text-anchor="middle" class="label" fill="#7A5DE1">Sparse Attention</text>
        <text x="1132.5" y="428" text-anchor="middle" class="tiny">context + local window</text>
      </g>
      <g id="module-four-step-sampling">
        <rect x="969" y="468" width="174" height="30" rx="15" fill="#7A5DE1"/>
        <text x="1056" y="488" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">4-step distilled sampling</text>
      </g>
    </g>
  </g>

  <g id="output-and-update">
    <g id="result-generated-segment" filter="url(#shadow)">
      <rect x="1296" y="124" width="252" height="230" rx="14" fill="#FFFFFF" stroke="#F5433D" stroke-width="1.5"/>
      <g id="generated-frame-placeholders">
        <rect x="1314" y="151" width="72" height="112" rx="8" fill="url(#image-placeholder)" stroke="#FBA09D"/>
        <rect x="1386" y="151" width="72" height="112" rx="8" fill="url(#image-placeholder)" stroke="#F86762"/>
        <rect x="1458" y="151" width="72" height="112" rx="8" fill="url(#image-placeholder)" stroke="#F5433D"/>
      </g>
      <text x="1422" y="295" text-anchor="middle" class="module-title" fill="#F5433D">Novel-view segment Ihat</text>
      <text x="1422" y="318" text-anchor="middle" class="meta">REPLACE: generated trajectory frames</text>
      <text x="1422" y="339" text-anchor="middle" class="tiny">interpolation / extrapolation</text>
    </g>
    <g id="module-geometry-update" filter="url(#shadow)">
      <rect x="1322" y="405" width="200" height="96" rx="13" fill="#B3CDA2" stroke="#88B06D" stroke-width="1.3"/>
      <text x="1422" y="440" text-anchor="middle" class="module-title" fill="#666666">Geometry update</text>
      <text x="1422" y="462" text-anchor="middle" class="meta">reconstruct generated views</text>
      <text x="1422" y="482" text-anchor="middle" class="tiny">replace Mgeo for next segment</text>
    </g>
  </g>

  <g id="connectors">
    <g id="primary-flow">
      <path id="connector-capture-estimator" class="primary" d="M151 334V390"/>
      <path id="connector-estimator-memory" class="primary" d="M237 437H278Q292 437 292 420V259Q292 236 318 236"/>
      <path id="connector-selected-diffusion" class="primary" d="M854 285H884"/>
      <path id="connector-render-diffusion" class="primary" d="M854 445H869Q884 445 884 430"/>
      <path id="connector-diffusion-output" class="primary" d="M1228 336H1296"/>
      <path id="connector-output-update" class="primary" d="M1422 354V405"/>
    </g>
    <g id="conditioning-flow">
      <path id="connector-capture-retrieval" class="condition" d="M250 246H272Q284 246 284 350V445Q284 455 318 455"/>
      <path id="connector-memory-retrieval" class="condition" d="M405 349V394"/>
      <path id="connector-memory-render" class="condition" d="M527 349V394"/>
      <path id="connector-retrieval-selected" class="condition" d="M454 445H630Q658 445 658 417V285Q658 285 684 285"/>
      <path id="connector-render-priors" class="condition" d="M614 445H684"/>
      <path id="connector-trajectory-retrieval" class="condition" d="M738 191V207Q738 220 718 220H650Q630 220 630 244V414Q630 430 614 430"/>
    </g>
    <g id="geometry-feedback-loop">
      <path id="connector-feedback" class="feedback" d="M1422 501V564Q1422 582 1402 582H466Q446 582 446 562V349"/>
      <text x="934" y="574" text-anchor="middle" class="label" fill="#88B06D">closed loop - generated views expand and correct the shared geometry</text>
    </g>
  </g>

  <g id="legend">
    <line x1="52" y1="643" x2="88" y2="643" class="primary"/>
    <text x="100" y="648" class="tiny">primary data flow</text>
    <line x1="236" y1="643" x2="272" y2="643" class="condition"/>
    <text x="284" y="648" class="tiny">retrieval / geometry conditioning</text>
    <line x1="514" y1="643" x2="550" y2="643" class="feedback"/>
    <text x="562" y="648" class="tiny">geometry-memory update</text>
    <text x="1572" y="648" text-anchor="end" class="tiny">All image areas are replaceable groups; scopes remain flat, important cards use light shadows.</text>
  </g>
</svg>
