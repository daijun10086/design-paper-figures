version: 1
status: collection-complete

preference_profile:
  id: graphics-siggraph
  priority: high
  source_scope: colors collected from user-approved Graphics and SIGGRAPH paper figures
  usage_scope: venue-agnostic and research-area-agnostic
  source_is_not_usage_constraint: true
  description: >-
    Treat color families and combinations explicitly approved from Graphics or
    SIGGRAPH papers as preferred candidates for any academic figure. Graphics or
    SIGGRAPH identifies provenance and aesthetic taste, not a restriction on where
    the colors may be used. Preserve figure semantics, contrast, and venue constraints.
  applies_to:
    - statistical-plots
    - pipeline-figures
    - neural-network-diagrams
    - teaser-figures
    - qualitative-results

color_spaces:
  canonical: srgb
  perceptual: oklch
  storage:
    - hex
    - rgb
    - oklch
    - alpha

evidence_status:
  candidate: extracted but not yet explicitly approved
  user-approved: explicitly identified by the user as visually desirable
  validated: reproduced successfully in a forward test
  preferred: repeatedly approved and suitable as a default candidate

extraction_policy:
  source_priority:
    - editable-vector-source
    - figure-generation-code
    - vector-pdf-objects
    - raster-region-sampling
  raster_rules:
    - Crop to intentional graphical marks before sampling.
    - Exclude photographs, rendered objects, backgrounds, text antialiasing, and shadows unless they are the design target.
    - Estimate flat-color regions with a robust median or perceptual cluster rather than a single pixel.
    - Record base color and alpha separately when transparency is used.
    - Record the composited appearance and background when the base color cannot be recovered reliably.
    - Visually verify every extracted color against the rendered figure.
  confidence_levels:
    exact: recovered from source code or vector object
    high: stable flat-region estimate from raster content
    medium: cluster estimate affected by compression or antialiasing
    low: visual approximation only

selection_policy:
  - Treat Graphics or SIGGRAPH as provenance metadata, never as a venue eligibility rule.
  - Consider approved colors for papers in any venue or research area before searching for unrelated new palettes.
  - Choose a palette combination before choosing isolated colors whenever possible.
  - When one stored color is selected, inspect its combination memberships and prioritize its approved companion colors.
  - Preserve the stored role mapping, background, lightness hierarchy, and approximate usage proportions.
  - If a color belongs to multiple combinations, select the combination by figure type, semantic role, and background.
  - Do not merge colors from unrelated combinations without a contrast and harmony review.
  - Treat opacity variants as members of the same color family, not as unrelated new colors.
  - Recheck legibility, grayscale behavior, and color-vision accessibility at the final paper size.

record_schema:
  color:
    required:
      - id
      - name
      - hex
      - rgb
      - oklch
      - alpha
      - roles
      - source
      - confidence
      - status
    optional:
      - composited_hex
      - background
      - family
      - variants
      - notes
      - preference_tier
  combination:
    required:
      - id
      - name
      - member_color_ids
      - role_mapping
      - background
      - source
      - suitable_for
      - pairing_guidance
      - status
    optional:
      - approximate_proportions
      - opacity_rules
      - line_styles
      - avoid
      - notes

source_registry:
  prior-p1:
    description: Previously approved P1 palette from Paper 01/02 and Forward Test 01.
    evidence: paper-aesthetic-observations.md
  prior-p1-p3:
    description: Exact color shared by prior P1 and P3; stored once and referenced by both combinations.
    evidence: paper-aesthetic-observations.md
  prior-p2:
    description: Previously approved Paper 01 Figure 2 comparison palette.
    evidence: paper-aesthetic-observations.md
  prior-p3:
    description: Previously approved and forward-tested Paper 01 Figure 3 status/callout palette.
    evidence: paper-aesthetic-observations.md
  prior-p4:
    description: Previously approved deep semantic-flow and gradient palette from Papers 03/04.
    evidence: paper-aesthetic-observations.md
  prior-p4-p5:
    description: Exact neutral shared by prior P4 and P5; stored once and referenced by both combinations.
    evidence: paper-aesthetic-observations.md
  prior-p5:
    description: Previously approved gray and burnt-orange workflow palette from Paper 04 Figure 2.
    evidence: paper-aesthetic-observations.md
  prior-shared:
    description: Previously approved shared neutral color.
    evidence: paper-aesthetic-observations.md
  sewing-f2-f3:
    paper: Learning Sewing Patterns via Latent Flow Matching of Implicit Fields
    figures:
    - Figure 2
    - Figure 3(a)
    - Figure 3(b)
    file:
    - fig/pipe_p4.pdf
    - fig/cluster_p.pdf
    extraction: The field raster was matched against standard diverging maps; canonical RdBu_r stops reproduce the
      observed JPEG-compressed colors.
  sewing-supp-f4:
    paper: Learning Sewing Patterns via Latent Flow Matching of Implicit Fields
    figures:
    - Supplementary Figure 4
    file:
    - fig/compare_GCD_p.pdf
    extraction: Robust medians and dominant modes from repeated flat foreground regions using embedded soft masks.
  sewing-supp-f5:
    paper: Learning Sewing Patterns via Latent Flow Matching of Implicit Fields
    figures:
    - Supplementary Figure 5
    file:
    - fig/completion_p.pdf
    extraction: Dominant flat-region modes from JPEG-compressed embedded images using soft masks.
  antipodal-main-f3:
    paper: 'The Antipodal Method: Fast, Accurate, and Robust 3D Generalized Winding Numbers'
    figures:
    - Figure 3(a)
    - Figure 3(b)
    file:
    - figures/alexander-numbering_1.pdf
    - figures/alexander-numbering_2.pdf
    extraction: Representative anchors from lossless embedded raster regions; the sphere lighting produces local
      lightness variation, so dominant region modes and stable interior samples were used.
  antipodal-main-f5:
    paper: 'The Antipodal Method: Fast, Accurate, and Robust 3D Generalized Winding Numbers'
    figures:
    - Figure 5(a)
    - Figure 5(b)
    file:
    - figures/discretization_a.pdf
    - figures/discretization_b.pdf
    extraction: Representative color and gray-lighting stops from the lossless embedded sphere render.
  antipodal-supp-f3:
    paper: 'The Antipodal Method: Fast, Accurate, and Robust 3D Generalized Winding Numbers'
    figures:
    - Supplementary Figure 3
    file:
    - figures/aq_accuracy.pdf
    extraction: Exact evenly spaced samples from the two lossless embedded 257-pixel colorbar rasters.
  matern-f4-bunnies:
    paper: Matérn Noise for Triangulation-Agnostic Flow Matching on Meshes
    figures:
    - Figure 4, rightmost three Stanford bunnies
    file:
    - figs/noise_sample_schemes.jpg
    extraction: Representative hue clusters from the right-half bunny foreground, excluding white background,
      black labels, shadows, and specular highlights. JPEG compression and surface lighting remain reflected in
      the confidence level.
deduplication_log:
  policy: Deduplicate exact sRGB hex values globally; preserve near colors when their source combination or role
    is distinct.
  prior_unique_colors_migrated: 43
  new_unique_colors_added: 48
  total_unique_colors: 91
  exact_reuse_examples:
  - '#F5433D is stored once and reused by P1 and P3.'
  - '#88B06D and #5D8DFD are stored once and reused by P1 and P3.'
  - '#000000, #666666, #A5A5A5, and #FFFFFF are shared by P4/P5 rather than duplicated.'
  - '#FFFFFF from the Supplementary Figure 3 evaluation ramp reuses the existing paper-white record.'
  near_colors_kept_distinct:
  - '#FB8E89 and #FBA09D remain distinct because they belong to different approved red roles.'
  - '#B2DEA1 remains distinct from prior soft greens because it is part of a new flesh-gray-green trio.'
  - '#999999 remains distinct from #939595 and #A5A5A5 because it is the exact repeated pattern gray.'
  - '#F9856A and #FA7D5E remain distinct because one is a Figure 3 region anchor and the other is an exact
    Supplementary Figure 3 gradient stop.'
