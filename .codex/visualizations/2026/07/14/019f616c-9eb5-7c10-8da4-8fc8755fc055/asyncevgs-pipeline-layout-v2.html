  <title id="pipeline-title">AsyncEvGS editable pipeline layout draft</title>
  <desc id="pipeline-desc">A compact left-to-right editable wireframe with aligned scopes, image replacement slots, rounded arrows, selective shadows, and two-stage 3D Gaussian Splatting optimization.</desc>
  <style>

    #asyncevgs-pipeline-layout-v2 .medium { font-size: 14px; font-weight: 500; }

    #asyncevgs-pipeline-layout-v2 .rgb-card { fill: #fbf1f3; stroke: #bd4054; stroke-width: 1.2; }
    #asyncevgs-pipeline-layout-v2 .event-card { fill: #eef5fb; stroke: #477da8; stroke-width: 1.2; }
    #asyncevgs-pipeline-layout-v2 .purple-card { fill: #f2edf8; stroke: #8d73b5; stroke-width: 1.2; }
    #asyncevgs-pipeline-layout-v2 .placeholder { fill: #f7f6f8; stroke: #8f8b94; stroke-width: 1.1; stroke-dasharray: 5 4; }
    #asyncevgs-pipeline-layout-v2 .placeholder-red { fill: #fff8f9; stroke: #bd4054; }
    #asyncevgs-pipeline-layout-v2 .placeholder-blue { fill: #f6fbff; stroke: #477da8; }
    #asyncevgs-pipeline-layout-v2 .arrow-gray, #asyncevgs-pipeline-layout-v2 .arrow-red, #asyncevgs-pipeline-layout-v2 .arrow-blue, #asyncevgs-pipeline-layout-v2 .arrow-purple { fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    #asyncevgs-pipeline-layout-v2 .arrow-gray { stroke: #6c6970; marker-end: url(#arrow-gray-v2); }
    #asyncevgs-pipeline-layout-v2 .arrow-red { stroke: #a4112b; marker-end: url(#arrow-red-v2); }
    #asyncevgs-pipeline-layout-v2 .arrow-blue { stroke: #124d86; marker-end: url(#arrow-blue-v2); }
    #asyncevgs-pipeline-layout-v2 .arrow-purple { stroke: #4b2d78; marker-end: url(#arrow-purple-v2); }
    #asyncevgs-pipeline-layout-v2 .dashed { stroke-dasharray: 6 5; }
    #asyncevgs-pipeline-layout-v2 .thin { stroke-width: 1.2; }
  </style>

      <path d="M0 0 L8 4 L0 8 Z" fill="#124d86"/>

    <marker id="arrow-purple-v2" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">

  </defs>

    <text x="1380" y="38" text-anchor="end" class="small muted">Dashed image slots are intentionally replaceable</text>
  </g>

  </g>

  <g id="external-connectors">

    <text x="736" y="666" text-anchor="middle" class="small blue-text">event structure supervision</text>
  </g>

  <g id="capture-column">
    <text x="122.5" y="96" text-anchor="middle" class="label muted">01 · ASYNC CAPTURE</text>

    <g id="rgb-input-card" filter="url(#soft-shadow-v2)">
      <rect x="36" y="118" width="173" height="160" rx="14" class="rgb-card"/>
      <text x="122.5" y="140" text-anchor="middle" class="label red-text">Motion-blurred RGB</text>
      <g id="replace-rgb-frame">
        <rect x="50" y="151" width="145" height="94" rx="9" class="placeholder placeholder-red"/>
        <circle cx="81" cy="176" r="8" fill="#e7aab4"/>
        <path d="M62 225 L91 191 L111 210 L129 187 L181 225 Z" fill="#f0cbd1" stroke="#bd4054" stroke-width="1"/>
        <text x="122.5" y="239" text-anchor="middle" class="small red-text">DROP RGB FRAME HERE</text>
      </g>
      <text x="122.5" y="264" text-anchor="middle" class="small muted">representative blur + scene color</text>
    </g>

    <g id="event-input-card" filter="url(#soft-shadow-v2)">
      <rect x="36" y="294" width="173" height="160" rx="14" class="event-card"/>

        <g fill="#4d8cbd">

          <circle cx="139" cy="371" r="3"/><circle cx="173" cy="351" r="2.5"/><circle cx="158" cy="395" r="2"/>

      </g>
      <text x="122.5" y="440" text-anchor="middle" class="small muted">same scene · asynchronous time</text>
    </g>

    <g id="capture-context-card">
      <rect x="36" y="470" width="173" height="148" rx="14" class="card"/>
      <text x="122.5" y="492" text-anchor="middle" class="label">Dual-camera rig</text>

        <rect x="50" y="503" width="145" height="68" rx="9" class="placeholder"/>
        <rect x="68" y="523" width="38" height="24" rx="5" fill="#d9d7dc" stroke="#79757e"/>
        <circle cx="87" cy="535" r="7" fill="#8e8992"/>
        <rect x="139" y="523" width="38" height="24" rx="5" fill="#d9d7dc" stroke="#79757e"/>
        <circle cx="158" cy="535" r="7" fill="#8e8992"/>
        <path d="M106 535 H139" stroke="#8e8992" stroke-width="3"/>

      <text x="122.5" y="607" text-anchor="middle" class="small purple-text">no hardware synchronization</text>

      <text x="342.5" y="148" text-anchor="middle" class="large white-text">E2VID</text>
      <text x="342.5" y="169" text-anchor="middle" class="small white-text">events → grayscale frames</text>
    </g>
    <path d="M342.5 188 V205" class="arrow-blue"/>

    <g id="event-preprocessing-module" filter="url(#soft-shadow-v2)">
      <rect x="256" y="208" width="173" height="80" rx="14" class="card"/>
      <text x="342.5" y="235" text-anchor="middle" class="label blue-text">Photometric cleanup</text>
      <text x="342.5" y="257" text-anchor="middle" class="small muted">bilateral denoise</text>
      <text x="342.5" y="274" text-anchor="middle" class="small muted">multi-frame brightness balance</text>
    </g>
    <path d="M342.5 288 V305" class="arrow-blue"/>

      <rect x="256" y="308" width="173" height="145" rx="14" class="placeholder placeholder-blue" filter="url(#soft-shadow-v2)"/>

      <path d="M284 409 L312 373 L337 397 L360 363 L402 409 Z" fill="#b9b8bd"/>
      <circle cx="300" cy="366" r="8" fill="#d0cfd3"/>
      <text x="342.5" y="442" text-anchor="middle" class="small blue-text">REPLACE WITH E2VID OUTPUT</text>
    </g>
    <path d="M342.5 453 V470" class="arrow-blue"/>

    <g id="replace-event-structure-maps">
      <rect x="256" y="473" width="173" height="145" rx="14" class="placeholder placeholder-blue"/>
      <text x="342.5" y="496" text-anchor="middle" class="label blue-text">Event-derived targets</text>
      <rect x="271" y="510" width="65" height="64" rx="8" fill="#edf3f8" stroke="#7598b8"/>
      <path d="M282 558 C296 526 310 554 325 523" fill="none" stroke="#124d86" stroke-width="2"/>
      <text x="303.5" y="588" text-anchor="middle" class="small blue-text">S(·)</text>
      <rect x="349" y="510" width="65" height="64" rx="8" fill="#edf3f8" stroke="#7598b8"/>
      <circle cx="371" cy="532" r="10" fill="#8eb3d3" fill-opacity=".45"/>
      <circle cx="391" cy="552" r="15" fill="#477da8" fill-opacity=".35"/>
      <text x="381.5" y="588" text-anchor="middle" class="small blue-text">confidence W</text>
      <text x="342.5" y="606" text-anchor="middle" class="small muted">replace with maps if available</text>
    </g>
  </g>

  <g id="vggt-column">
    <text x="562.5" y="96" text-anchor="middle" class="label purple-text">03 · CROSS-DOMAIN INIT.</text>

    <g id="vggt-module" filter="url(#soft-shadow-v2)">

      <text x="560.5" y="192" text-anchor="middle" class="small muted">shared geometric initialization</text>

    <path d="M560.5 213 V232" class="arrow-gray"/>

      <rect x="476" y="235" width="169" height="175" rx="14" class="placeholder" filter="url(#soft-shadow-v2)"/>

      <text x="560.5" y="401" text-anchor="middle" class="small purple-text">OR CAMERA POSES HERE</text>

      <rect x="476" y="432" width="80" height="88" rx="13" class="purple-card"/>
      <text x="516" y="458" text-anchor="middle" class="label purple-text">All poses</text>
      <text x="516" y="480" text-anchor="middle" class="small muted">RGB + event</text>
      <text x="516" y="500" text-anchor="middle" class="small muted">refine later</text>

      <text x="605" y="480" text-anchor="middle" class="small muted">confidence</text>
      <text x="605" y="500" text-anchor="middle" class="small muted">filter &gt; 50%</text>
    </g>

      <text x="560.5" y="565" text-anchor="middle" class="label purple-text">Shared initialization</text>
      <text x="560.5" y="587" text-anchor="middle" class="small muted">initialize both 3DGS stages</text>
      <text x="560.5" y="605" text-anchor="middle" class="small muted">jointly refine poses in Stage 2</text>

      <text x="718" y="174" class="large">Coarse 3DGS G<tspan baseline-shift="sub" class="small">ref</tspan></text>
      <text x="718" y="199" class="small muted">VGGT initialization · optimize L<tspan baseline-shift="sub">blur</tspan></text>
      <rect x="1044" y="148" width="72" height="34" rx="17" fill="#69666d"/>
      <text x="1080" y="170" text-anchor="middle" class="label white-text">FROZEN</text>
    </g>

      <text x="918" y="328" text-anchor="middle" class="large">Joint 3D Gaussian Splatting</text>
      <text x="918" y="356" text-anchor="middle" class="label muted">new VGGT initialization + joint pose refinement</text>
      <text x="918" y="382" text-anchor="middle" class="small muted">combine faithful RGB appearance with event-guided high-frequency structure</text>
      <rect x="849" y="396" width="138" height="24" rx="12" fill="#f0ebf7" stroke="#8d73b5"/>
      <text x="918" y="413" text-anchor="middle" class="small purple-text">five-objective optimization</text>
    </g>

    <g id="rgb-loss-card">
      <rect x="696" y="456" width="210" height="162" rx="15" class="rgb-card"/>
      <text x="801" y="482" text-anchor="middle" class="label red-text">RGB / DEBLUR SUPERVISION</text>
      <text x="801" y="505" text-anchor="middle" class="small muted">MLP trajectory → N=5 renders → average</text>
      <rect x="717" y="525" width="168" height="31" rx="15.5" fill="#fff8f9" stroke="#bd4054"/>
      <text x="801" y="546" text-anchor="middle" class="label red-text">Lblur · blurred RGB</text>
      <rect x="717" y="568" width="168" height="31" rx="15.5" fill="#fff8f9" stroke="#bd4054"/>
      <text x="801" y="589" text-anchor="middle" class="label red-text">Lreg-r · RGB consistency</text>
    </g>
    <path d="M801 456 V438 Q801 431 820 428" class="arrow-red dashed"/>

      <rect x="920" y="456" width="220" height="162" rx="15" class="event-card"/>
      <text x="1030" y="482" text-anchor="middle" class="label blue-text">EVENT-GUIDED SUPERVISION</text>
      <text x="1030" y="505" text-anchor="middle" class="small muted">temporal contrast + structural fidelity</text>
      <rect x="942" y="525" width="176" height="31" rx="15.5" fill="#f6fbff" stroke="#477da8"/>
      <text x="1030" y="546" text-anchor="middle" class="label blue-text">Levs · temporal events</text>
      <rect x="942" y="568" width="176" height="27" rx="13.5" fill="#f6fbff" stroke="#477da8"/>
      <text x="1030" y="587" text-anchor="middle" class="label blue-text">Lstruct · weighted SSIM</text>
      <text x="1030" y="608" text-anchor="middle" class="small muted">remove luminance term</text>
    </g>
    <path d="M1030 456 V438 Q1030 431 1012 428" class="arrow-blue dashed"/>
  </g>

    <path d="M1277.5 218 V239" class="arrow-purple"/>

    <g id="replace-final-output">
      <rect x="1191" y="242" width="173" height="276" rx="15" class="placeholder" filter="url(#soft-shadow-v2)"/>
      <text x="1277.5" y="268" text-anchor="middle" class="label purple-text">Primary result panel</text>
      <rect x="1208" y="286" width="139" height="184" rx="10" fill="#eeeaf4" stroke="#8d73b5" stroke-width="1.1"/>
      <circle cx="1242" cy="326" r="13" fill="#c9bbdb"/>
      <path d="M1219 449 L1250 375 L1277 413 L1300 352 L1336 449 Z" fill="#b29dcc" stroke="#73549d" stroke-width="1.2"/>
      <text x="1277.5" y="484" text-anchor="middle" class="small purple-text">DROP NOVEL VIEW HERE</text>
      <text x="1277.5" y="500" text-anchor="middle" class="small purple-text">OR USE A POINT CLOUD</text>
    </g>

    <g id="output-deliverables-card">
      <rect x="1191" y="542" width="173" height="76" rx="14" class="card"/>
      <text x="1277.5" y="567" text-anchor="middle" class="label">Suggested replacement</text>
      <text x="1277.5" y="589" text-anchor="middle" class="small muted">1 main novel view</text>
      <text x="1277.5" y="606" text-anchor="middle" class="small muted">or render + point-cloud pair</text>
    </g>
